<head>
  <title>RankRoom - 3-Phase Decision Making</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div id="app-container">
    {{> applicationLayout}}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

<template name="applicationLayout">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">RankRoom</a>
      <div class="navbar-nav ms-auto">
        {{#if currentUser}}
          <span class="navbar-text me-3">{{currentUser.name}}</span>
          <button class="btn btn-outline-light btn-sm" id="logout-btn">Logout</button>
        {{else}}
          <button class="btn btn-outline-light btn-sm" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button>
        {{/if}}
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    {{#if Template.subscriptionsReady}}
      {{> Template.dynamic template=mainTemplate}}
    {{else}}
      {{> loading}}
    {{/if}}
  </main>

  <!-- Login Modal -->
  <div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Login to RankRoom</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="login-form">
          <div class="modal-body">
            <div class="mb-3">
              <label for="user-name" class="form-label">Your Name</label>
              <input type="text" class="form-control" id="user-name" required>
            </div>
            <div class="mb-3">
              <label for="user-email" class="form-label">Email</label>
              <input type="email" class="form-control" id="user-email" required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Login</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</template>

<template name="loading">
  <div class="text-center">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
</template>

<template name="home">
  <div class="row">
    <div class="col-md-8 mx-auto">
      <div class="text-center mb-5">
        <h1>Welcome to RankRoom</h1>
        <p class="lead">Create decision topics using our 3-phase collaborative workflow</p>
        <div class="row text-center">
          <div class="col-md-4">
            <div class="card border-primary">
              <div class="card-body">
                <h5 class="text-primary">1. Definition</h5>
                <p class="small">Define and share criteria that matter to your decision</p>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card border-warning">
              <div class="card-body">
                <h5 class="text-warning">2. Collection</h5>
                <p class="small">Evaluate candidates against criteria privately</p>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card border-success">
              <div class="card-body">
                <h5 class="text-success">3. Decision</h5>
                <p class="small">Analyze results and make informed decisions</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      {{#if currentUser}}
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Create New Decision Topic</h5>
        </div>
        <div class="card-body">
          <form id="create-topic-form">
            <div class="mb-3">
              <label for="topic-name" class="form-label">Topic Name</label>
              <input type="text" class="form-control" id="topic-name" required>
            </div>
            
            <div class="mb-3">
              <label for="topic-description" class="form-label">Description</label>
              <textarea class="form-control" id="topic-description" rows="3"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Create Topic</button>
          </form>
        </div>
      </div>

      {{#if recentTopics.length}}
      <div class="card mt-4">
        <div class="card-header">
          <h5 class="mb-0">Your Topics</h5>
        </div>
        <div class="card-body">
          {{#each recentTopics}}
          <div class="d-flex justify-content-between align-items-center border-bottom py-2">
            <div>
              <strong>{{name}}</strong>
              <small class="text-muted d-block">{{description}}</small>
              <small class="text-muted">Phase {{currentPhase}} • Created {{formatDate createdAt}}</small>
            </div>
            <a href="/topic/{{_id}}" class="btn btn-sm btn-outline-primary">Enter Topic</a>
          </div>
          {{/each}}
        </div>
      </div>
      {{/if}}

      {{else}}
      <div class="card">
        <div class="card-body text-center">
          <h5>Get Started</h5>
          <p>Login to create and participate in decision topics</p>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button>
        </div>
      </div>
      {{/if}}
    </div>
  </div>
</template>

<template name="topic">
  {{#if topic}}
  <div class="row">
    <div class="col-12">
      <!-- Topic Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1>{{topic.name}}</h1>
          <p class="text-muted mb-0">{{topic.description}}</p>
          <small class="text-muted">
            Phase {{topic.currentPhase}}: {{phaseNames.[topic.currentPhase]}}
            {{#if topic.phaseAdvancedAt}}• Advanced {{formatDate topic.phaseAdvancedAt}}{{/if}}
          </small>
        </div>
        
        {{#if isTopicLeader}}
        <div class="btn-group">
          {{#if canAdvancePhase}}
          <button class="btn btn-success btn-sm" id="advance-phase-btn">
            Advance to {{nextPhaseName}}
          </button>
          {{/if}}
          <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#inviteModal">
            Invite Participants
          </button>
        </div>
        {{/if}}
      </div>

      <!-- Phase Progress -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="progress">
            <div class="progress-bar {{phaseProgressClass}}" style="width: {{phaseProgress}}%">
              {{phaseNames.[topic.currentPhase]}}
            </div>
          </div>
        </div>
      </div>

      <!-- Participants -->
      <div class="card mb-4">
        <div class="card-header">
          <h6 class="mb-0">Participants ({{participants.length}})</h6>
        </div>
        <div class="card-body">
          <div class="row">
            {{#each participants}}
            <div class="col-auto mb-2">
              <span class="badge {{#if (eq _id ../topic.createdBy)}}bg-primary{{else}}bg-secondary{{/if}}">
                {{name}} {{#if (eq _id ../topic.createdBy)}}(Leader){{/if}}
              </span>
            </div>
            {{/each}}
          </div>
        </div>
      </div>

      <!-- Phase-specific content -->
      {{#if (eq topic.currentPhase 1)}}
        {{> definitionPhase}}
      {{else}}{{#if (eq topic.currentPhase 2)}}
        {{> collectionPhase}}
      {{else}}{{#if (eq topic.currentPhase 3)}}
        {{> decisionPhase}}
      {{/if}}{{/if}}{{/if}}

    </div>
  </div>

  <!-- Invite Modal -->
  <div class="modal fade" id="inviteModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Invite Participants</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="topic-url" class="form-label">Topic URL</label>
            <div class="input-group">
              <input type="text" class="form-control" id="topic-url" value="{{topicUrl}}" readonly>
              <button class="btn btn-outline-secondary" id="copy-url-btn">Copy</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {{else}}
  <div class="text-center">
    <h3>Topic not found</h3>
    <p>The topic you're looking for doesn't exist.</p>
    <a href="/" class="btn btn-primary">Go Home</a>
  </div>
  {{/if}}
</template>

<template name="definitionPhase">
  <div class="row">
    <!-- Personal Criteria -->
    <div class="col-md-6">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="mb-0">Your Criteria</h5>
          <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addCriterionModal">
            Add Criterion
          </button>
        </div>
        <div class="card-body">
          {{#if personalCriteria.length}}
          <div class="list-group list-group-flush">
            {{#each personalCriteria}}
            <div class="list-group-item d-flex justify-content-between align-items-center">
              <div>
                <strong>{{name}}</strong>
                <p class="mb-1 small text-muted">{{description}}</p>
              </div>
              <div class="btn-group">
                {{#if isShared}}
                <span class="badge bg-success">Shared</span>
                {{else}}
                <button class="btn btn-sm btn-outline-success share-criterion-btn" data-criterion-id="{{_id}}">
                  Share
                </button>
                {{/if}}
              </div>
            </div>
            {{/each}}
          </div>
          {{else}}
          <p class="text-muted text-center">No criteria yet. Add your first criterion!</p>
          {{/if}}
        </div>
      </div>
    </div>

    <!-- Shared Criteria -->
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Shared Criteria</h5>
        </div>
        <div class="card-body">
          {{#if sharedCriteria.length}}
          <div class="list-group list-group-flush">
            {{#each sharedCriteria}}
            <div class="list-group-item">
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <strong>{{name}}</strong>
                  <p class="mb-1 small text-muted">{{description}}</p>
                  <small class="text-muted">by {{user.name}}</small>
                </div>
              </div>
            </div>
            {{/each}}
          </div>
          {{else}}
          <p class="text-muted text-center">No shared criteria yet</p>
          {{/if}}
        </div>
      </div>
    </div>
  </div>

  <!-- Add Criterion Modal -->
  <div class="modal fade" id="addCriterionModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Criterion</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="add-criterion-form">
          <div class="modal-body">
            <div class="mb-3">
              <label for="criterion-name" class="form-label">Criterion Name</label>
              <input type="text" class="form-control" id="criterion-name" required>
            </div>
            <div class="mb-3">
              <label for="criterion-description" class="form-label">Description</label>
              <textarea class="form-control" id="criterion-description" rows="2"></textarea>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="criterion-shared">
              <label class="form-check-label" for="criterion-shared">
                Share with other participants
              </label>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Add Criterion</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</template>

<template name="collectionPhase">
  <div class="row">
    <!-- Candidates -->
    <div class="col-md-4">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="mb-0">Candidates</h5>
          <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addCandidateModal">
            Add Candidate
          </button>
        </div>
        <div class="card-body">
          {{#if candidates.length}}
          <div class="list-group list-group-flush">
            {{#each candidates}}
            <div class="list-group-item candidate-item {{#if (eq _id ../selectedCandidate._id)}}active{{/if}}" 
                 data-candidate-id="{{_id}}">
              <strong>{{name}}</strong>
              <p class="mb-0 small text-muted">{{description}}</p>
            </div>
            {{/each}}
          </div>
          {{else}}
          <p class="text-muted text-center">No candidates yet</p>
          {{/if}}
        </div>
      </div>
    </div>

    <!-- Evaluation Form -->
    <div class="col-md-8">
      {{#if selectedCandidate}}
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Evaluate: {{selectedCandidate.name}}</h5>
        </div>
        <div class="card-body">
          <form id="evaluation-form">
            {{#each sharedCriteria}}
            <div class="mb-4">
              <label class="form-label">
                <strong>{{name}}</strong>
                {{#if description}}<small class="text-muted">({{description}})</small>{{/if}}
              </label>
              <div class="row align-items-center">
                <div class="col-2">
                  <span class="small">Poor (1)</span>
                </div>
                <div class="col-8">
                  <input type="range" class="form-range" min="1" max="10" 
                         data-criterion-id="{{_id}}" value="{{getEvaluationScore _id ../selectedCandidate._id}}">
                </div>
                <div class="col-2">
                  <span class="small">Excellent (10)</span>
                </div>
              </div>
              <div class="text-center">
                <span class="badge bg-primary score-display">{{getEvaluationScore _id ../selectedCandidate._id}}</span>
              </div>
              <textarea class="form-control mt-2" placeholder="Notes (optional)" 
                       data-criterion-id="{{_id}}">{{getEvaluationNotes _id ../selectedCandidate._id}}</textarea>
            </div>
            {{/each}}
            
            {{#if sharedCriteria.length}}
            <button type="submit" class="btn btn-success">Save Evaluation</button>
            {{else}}
            <p class="text-muted">No shared criteria available. Return to Definition phase to create criteria.</p>
            {{/if}}
          </form>
        </div>
      </div>
      {{else}}
      <div class="card">
        <div class="card-body text-center">
          <h5>Select a Candidate</h5>
          <p>Choose a candidate from the left to start evaluating</p>
        </div>
      </div>
      {{/if}}
    </div>
  </div>

  <!-- Add Candidate Modal -->
  <div class="modal fade" id="addCandidateModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Candidate</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="add-candidate-form">
          <div class="modal-body">
            <div class="mb-3">
              <label for="candidate-name" class="form-label">Candidate Name</label>
              <input type="text" class="form-control" id="candidate-name" required>
            </div>
            <div class="mb-3">
              <label for="candidate-description" class="form-label">Description</label>
              <textarea class="form-control" id="candidate-description" rows="2"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Add Candidate</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</template>

<template name="decisionPhase">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Results and Analysis</h5>
        </div>
        <div class="card-body">
          {{#if aggregatedResults.length}}
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Candidate</th>
                  <th>Average Score</th>
                  <th>Score Variance</th>
                  <th>Details</th>
                </tr>
              </thead>
              <tbody>
                {{#each aggregatedResults}}
                <tr>
                  <td><strong>{{@index}}</strong></td>
                  <td>
                    <strong>{{candidate.name}}</strong>
                    <div class="small text-muted">{{candidate.description}}</div>
                  </td>
                  <td>
                    <span class="badge bg-primary">{{formatScore averageScore}}</span>
                  </td>
                  <td>
                    <span class="badge bg-secondary">{{formatScore scoreVariance}}</span>
                  </td>
                  <td>
                    <button class="btn btn-sm btn-outline-primary" data-bs-toggle="collapse" 
                            data-bs-target="#details-{{@index}}">
                      View Details
                    </button>
                  </td>
                </tr>
                <tr class="collapse" id="details-{{@index}}">
                  <td colspan="5">
                    <div class="row">
                      {{#each criteriaScores}}
                      <div class="col-md-3 mb-2">
                        <div class="card border-light">
                          <div class="card-body p-2">
                            <h6 class="card-title small">{{criterion.name}}</h6>
                            <p class="card-text">
                              <span class="badge bg-info">{{formatScore averageScore}}</span>
                              <small class="text-muted">({{evaluationCount}} evaluations)</small>
                            </p>
                          </div>
                        </div>
                      </div>
                      {{/each}}
                    </div>
                  </td>
                </tr>
                {{/each}}
              </tbody>
            </table>
          </div>
          {{else}}
          <p class="text-muted text-center">No evaluation data available</p>
          {{/if}}
        </div>
      </div>
    </div>
  </div>
</template>
