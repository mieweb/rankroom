<head>
  <title>RankRoom - Decision Room App</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div id="app-container">
    {{> applicationLayout}}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

<template name="applicationLayout">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">RankRoom</a>
      <div class="navbar-nav ms-auto">
        {{#if currentUser}}
          <span class="navbar-text me-3">{{currentUser.username}}</span>
          <button class="btn btn-outline-light btn-sm" id="logout-btn">Logout</button>
        {{else}}
          {{> loginButtons}}
        {{/if}}
      </div>
    </div>
  </nav>

  <main class="container mt-4">
    {{#if Template.subscriptionsReady}}
      {{> Template.dynamic template=mainTemplate}}
    {{else}}
      {{> loading}}
    {{/if}}
  </main>
</template>

<template name="loading">
  <div class="text-center">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
</template>

<template name="home">
  <div class="row">
    <div class="col-md-8 mx-auto">
      <div class="text-center mb-5">
        <h1>Welcome to RankRoom</h1>
        <p class="lead">Create decision rooms for collaborative voting and idea generation</p>
      </div>

      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">Create New Decision Room</h5>
        </div>
        <div class="card-body">
          <form id="create-room-form">
            <div class="mb-3">
              <label for="room-title" class="form-label">Room Title</label>
              <input type="text" class="form-control" id="room-title" required>
            </div>
            
            <div class="mb-3">
              <label for="room-description" class="form-label">Description</label>
              <textarea class="form-control" id="room-description" rows="3"></textarea>
            </div>

            <div class="mb-3">
              <label for="voting-system" class="form-label">Voting System</label>
              <select class="form-select" id="voting-system">
                <option value="dot-voting">Dot Voting</option>
                <option value="first-past-the-post">First Past the Post</option>
                <option value="alternative-voting">Alternative Voting</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="votes-per-participant" class="form-label">Votes per Participant</label>
              <input type="number" class="form-control" id="votes-per-participant" value="3" min="1">
            </div>

            <div class="mb-3">
              <label class="form-label">Phases</label>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="phases" id="separate-phases" value="separate" checked>
                <label class="form-check-label" for="separate-phases">
                  Separate idea submission and voting phases
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="phases" id="combined-phases" value="combined">
                <label class="form-check-label" for="combined-phases">
                  Combined submission and voting
                </label>
              </div>
            </div>

            <div class="mb-3">
              <label for="authentication" class="form-label">Authentication</label>
              <select class="form-select" id="authentication">
                <option value="anonymous">Anonymous (anyone with URL)</option>
                <option value="required">Login required</option>
                <option value="sso">Single Sign-On only</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary">Create Room</button>
          </form>
        </div>
      </div>

      {{#if recentRooms.length}}
      <div class="card mt-4">
        <div class="card-header">
          <h5 class="mb-0">Recent Rooms</h5>
        </div>
        <div class="card-body">
          {{#each recentRooms}}
          <div class="d-flex justify-content-between align-items-center border-bottom py-2">
            <div>
              <strong>{{title}}</strong>
              <small class="text-muted d-block">{{description}}</small>
              <small class="text-muted">Created {{formatDate createdAt}}</small>
            </div>
            <a href="/room/{{_id}}" class="btn btn-sm btn-outline-primary">Enter Room</a>
          </div>
          {{/each}}
        </div>
      </div>
      {{/if}}
    </div>
  </div>
</template>

<template name="room">
  {{#if room}}
  <div class="row">
    <div class="col-12">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1>{{room.title}}</h1>
          <p class="text-muted mb-0">{{room.description}}</p>
          <small class="text-muted">
            {{room.votingSystem}} • {{room.votesPerParticipant}} votes per participant
            {{#if room.endedAt}}• Voting ended{{/if}}
          </small>
        </div>
        
        {{#if isRoomCreator}}
        <div class="btn-group">
          <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#inviteModal">
            Share Room
          </button>
          {{#unless room.endedAt}}
          <button class="btn btn-warning btn-sm" id="end-voting-btn">End Voting</button>
          {{/unless}}
          <button class="btn btn-danger btn-sm" id="destroy-room-btn">Destroy Room</button>
        </div>
        {{/if}}
      </div>

      <!-- Participants -->
      <div class="card mb-4">
        <div class="card-header">
          <h6 class="mb-0">Participants ({{participants.length}})</h6>
        </div>
        <div class="card-body">
          <div class="row">
            {{#each participants}}
            <div class="col-auto mb-2">
              <span class="badge bg-secondary">{{name}}</span>
            </div>
            {{/each}}
          </div>
        </div>
      </div>

      <!-- Ideas Section -->
      <div class="row">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <h5 class="mb-0">Ideas</h5>
              {{#unless room.endedAt}}
              <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#submitIdeaModal">
                Submit Idea
              </button>
              {{/unless}}
            </div>
            <div class="card-body">
              {{#if ideas.length}}
              <div class="list-group list-group-flush">
                {{#each ideas}}
                <div class="list-group-item d-flex justify-content-between align-items-start">
                  <div class="flex-grow-1">
                    <p class="mb-1">{{text}}</p>
                    <small class="text-muted">{{formatDate submittedAt}}</small>
                  </div>
                  <div class="text-end">
                    <span class="badge bg-primary rounded-pill">{{voteCount}} votes</span>
                    {{#unless ../room.endedAt}}
                    <button class="btn btn-sm btn-outline-primary ms-2 vote-btn" data-idea-id="{{_id}}">
                      Vote
                    </button>
                    {{/unless}}
                  </div>
                </div>
                {{/each}}
              </div>
              {{else}}
              <p class="text-muted text-center">No ideas yet. Be the first to submit one!</p>
              {{/if}}
            </div>
          </div>
        </div>

        <!-- Voting Results -->
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5 class="mb-0">Voting Results</h5>
            </div>
            <div class="card-body">
              {{#if rankedIdeas.length}}
              <div class="list-group list-group-flush">
                {{#each rankedIdeas}}
                <div class="list-group-item d-flex justify-content-between align-items-center">
                  <div>
                    <strong>{{@index}}</strong>. {{text}}
                  </div>
                  <span class="badge bg-success rounded-pill">{{voteCount}}</span>
                </div>
                {{/each}}
              </div>
              {{else}}
              <p class="text-muted text-center">No votes yet</p>
              {{/if}}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Submit Idea Modal -->
  <div class="modal fade" id="submitIdeaModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Submit New Idea</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="submit-idea-form">
          <div class="modal-body">
            <div class="mb-3">
              <label for="idea-text" class="form-label">Your Idea</label>
              <textarea class="form-control" id="idea-text" rows="3" required></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Submit Idea</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Invite Modal -->
  <div class="modal fade" id="inviteModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Share Room</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="room-url" class="form-label">Room URL</label>
            <div class="input-group">
              <input type="text" class="form-control" id="room-url" value="{{roomUrl}}" readonly>
              <button class="btn btn-outline-secondary" id="copy-url-btn">Copy</button>
            </div>
          </div>
          
          <div class="mb-3">
            <button class="btn btn-primary" id="generate-invite-btn">Generate Individual Invite</button>
          </div>

          {{#if inviteUrls.length}}
          <div class="mt-3">
            <h6>Individual Invites</h6>
            {{#each inviteUrls}}
            <div class="input-group mb-2">
              <input type="text" class="form-control" value="{{url}}" readonly>
              <button class="btn btn-outline-secondary copy-invite-btn">Copy</button>
            </div>
            {{/each}}
          </div>
          {{/if}}
        </div>
      </div>
    </div>
  </div>

  {{else}}
  <div class="text-center">
    <h3>Room not found</h3>
    <p>The room you're looking for doesn't exist or has been destroyed.</p>
    <a href="/" class="btn btn-primary">Go Home</a>
  </div>
  {{/if}}
</template>
